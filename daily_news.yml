name: Daily News Aggregator

on:
  schedule:
    # Ejecutar todos los días a las 11:00 AM UTC (aprox 6:00 AM EST)
    - cron: '0 11 * * *'
  workflow_dispatch: # Permite ejecución manual desde GitHub

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Fetch news and generate JSON
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python fetch_news.py
        
    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/*.json
        # Solo hacer commit si hay cambios
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: Daily news data" && git push)
